# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: MSBuild

on:
  push:
    branches: [ "master" ]
    tags: ['v*']
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

  # These will get overriden dynamically
  OUTPUT_DIR: bin
  RELEASE_NAME:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Setup vars
      shell: bash
      run: |
        echo "RELEASE_NAME=${GITHUB_REF_NAME//\//-}" >> $GITHUB_ENV
        echo "OUTPUT_DIR=x64\${{env.BUILD_CONFIGURATION}}" >> $GITHUB_ENV

    - uses: actions/checkout@v4

    - uses: actions/checkout@v4
      with:
        repository: CLIUtils/CLI11
        path: deps/CLI11
    
    - uses: actions/checkout@v4
      with:
        repository: catchorg/Catch2
        path: deps/Catch2
        ref: v2.x
    
    # Setup the .props file using PowerShell
    - name: Configure Requirements.props
      run: |
        Copy-Item Requirements.example.props Requirements.props
        (Get-Content Requirements.props) -replace '<CLI11></CLI11>', '<CLI11>$(MSBuildThisFileDirectory)deps\CLI11</CLI11>' | Set-Content Requirements.props
        (Get-Content Requirements.props) -replace '<Catch2></Catch2>', '<Catch2>$(MSBuildThisFileDirectory)deps\Catch2</Catch2>' | Set-Content Requirements.props
        Write-Host "--- Updated Requirements.props Content ---"
        Get-Content Requirements.props

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: msbuild /m /p:WindowsTargetPlatformVersion=10.0 /p:PlatformToolset=v143 /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}\ntfsdd.sln


    # Tests
    - name: Run Tests
      shell: powershell
      run: |
        $testExe = "${{env.OUTPUT_DIR}}\ntfsdd-tests.exe"
          
        if (Test-Path $testExe) {
            Write-Host "Starting tests: $testExe"
            & $testExe
        } else {
            Write-Error "Test executable not found at $testExe"
            exit 1
        }


    # Automatic releases
    - name: Stage Release Files
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path ./release-dist
        Copy-Item "${{env.OUTPUT_DIR}}\ntfsdd.exe" -Destination "./release-dist/"
        Copy-Item "${{env.OUTPUT_DIR}}\ntfs.exe" -Destination "./release-dist/"

    - name: Create ZIP
      shell: powershell
      run: Compress-Archive -Path ./release-dist/* -DestinationPath ./ntfsdd-${{ env.RELEASE_NAME }}.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ntfsdd-${{ env.RELEASE_NAME }}.zip
        name: ntfsdd ${{ env.RELEASE_NAME }}
        draft: false
        prerelease: false
