# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: MSBuild

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/checkout@v4
      with:
        repository: CLIUtils/CLI11
        path: deps/CLI11
    
    - uses: actions/checkout@v4
      with:
        repository: catchorg/Catch2
        path: deps/Catch2
        ref: v2.x
    
    # Setup the .props file using PowerShell
    - name: Configure Requirements.props
      run: |
        Copy-Item Requirements.example.props Requirements.props
        (Get-Content Requirements.props) -replace '<CLI11></CLI11>', '<CLI11>deps/CLI11</CLI11>' | Set-Content Requirements.props
        (Get-Content Requirements.props) -replace '<Catch2></Catch2>', '<Catch2>deps/Catch2</Catch2>' | Set-Content Requirements.props

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}\ntfsdd.sln
